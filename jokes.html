            { id: 89, cat: "Tiere", text: "Ein stolzer Löwe geht durch die Savanne und will seine Macht demonstrieren. Er trifft einen kleinen Affen, packt ihn am Kragen, fletscht die Zähne und brüllt: 'Wer ist der absolute König aller Tiere im gesamten Dschungel?!'\n\nDer Affe zittert am ganzen Körper und piepst: 'Du natürlich, mächtiger Löwe! Wer denn sonst!' Der Löwe lächelt zufrieden und lässt ihn laufen.\n\nAls Nächstes trifft er eine Giraffe. Er stellt sich ihr in den Weg und brüllt: 'Wer ist das mächtigste Lebewesen auf dieser Welt?!'\n\nDie Giraffe guckt ganz erschrocken und stammelt: 'Oh, das bist ganz eindeutig du, großer Löwe!' Der Löwe klopft sich auf die Brust und geht weiter.\n\nSchließlich trifft er auf einen riesigen, tonnenschweren Elefantenbullen, der seelenruhig an einem Baum knabbert. Der Löwe baut sich vor ihm auf, holt tief Luft und brüllt aus vollem Hals: 'Hey du grauer Riese! Wer ist der absolute Herrscher und unschlagbare König der afrikanischen Wildnis?!'\n\nDer Elefant schaut nicht mal richtig hin, schlingt einfach seinen Rüssel um den Löwen, wirbelt ihn dreimal im Kreis durch die Luft, schmettert ihn mit voller Wucht gegen einen dicken Felsen und tritt im Vorbeigehen noch mal ganz locker mit dem Fuß auf ihn drauf.\n\nDer Löwe liegt völlig ramponiert im Staub, spuckt Blut, rappelt sich mühsam auf, wischt sich den Dreck aus den Augen und ruft dem Elefanten hinterher: 'Mensch, man wird ja wohl noch eine ganz normale Frage stellen dürfen, ohne dass du hier gleich völlig ausrastest!'" },
            { id: 90, cat: "Gastronomie", text: "Ein Gast sitzt in einer gemütlichen Dorfkneipe und bestellt ein Jägerschnitzel mit Pommes. Als das Essen kommt, traut er seinen Augen nicht: Auf dem Teller liegt ein winziges Schnitzel, das kaum größer ist als eine Euro-Münze, umringt von genau drei Pommes.\n\nDer Gast ruft den Wirt völlig fassungslos an den Tisch: 'Sagen Sie mal, Herr Wirt! Was ist das denn bitteschön für eine unverschämte Portion?! Davon wird doch nicht mal eine Maus satt! Ich verlange sofort eine Erklärung!'\n\nDer Wirt beugt sich diskret zu ihm herunter, schaut sich nervös um und flüstert leise: 'Pst, machen Sie bloß nicht so einen Lärm! Wir haben heute eine schwere Kontrolle vom Gewerbeamt im Haus. Und wenn die Gauner spitzkriegen, dass ich Ihnen aus Versehen die normale Portion für unsere Privatgäste serviert habe, sperren die mir morgen den ganzen Laden zu!'" },
            { id: 91, cat: "Alltag", text: "Ein Mann geht in eine Bank, geht zum Schalter und sagt ganz höflich zum Angestellten: 'Guten Tag. Ich möchte bitte ein Girokonto für meine Katze einrichten.'\n\nDer Bankangestellte starrt ihn fassungslos an, schüttelt den Kopf und sagt: 'Sagen Sie mal, wollen Sie mich auf den Arm nehmen?! Eine Katze kann doch kein Bankkonto eröffnen! Tiere sind rechtlich gesehen gar nicht geschäftsfähig! Wie soll das denn bitteschön funktionieren?'\n\nDer Mann holt ein dickes Bündel 500-Euro-Scheine aus der Tasche, legt es auf den Tresen und sagt ruhig: 'Meine Katze hat geerbt. Es geht um genau drei Millionen Euro bar auf die Hand.'\n\nDer Bankangestellte wird schlagartig blass, schluckt schwer, tippt wie wild auf seiner Tastatur herum, schaut den Mann mit einem breiten, professionellen Grinsen an und fragt zuckersüß: 'Sehr gerne, mein Herr! Und soll die kleine Miezekatze denn auch direkt eine goldene Kreditkarte mit persönlicher Pfoten-Prägung dazu bekommen, oder reicht ihr für den Anfang erst mal das normale Online-Banking mit Katzenminze-Flatrate?!'" },
            { id: 92, cat: "Kneipe", text: "Ein Mann kommt völlig deprimiert in eine Bar, setzt sich an den Tresen und bestellt beim Barkeeper zehn Gläser edlen Whisky auf einmal. Er fängt an, die Gläser im Sekundentakt nacheinander in einem Zug leerzutrinken.\n\nDer Barkeeper schaut entsetzt zu und sagt nach dem siebten Glas bewundernd: 'Mensch, Kollege! Sie schütten den teuren Schnaps ja in einem Tempo runter, das habe ich noch nie erlebt! Darf ich fragen, was es da bitteschön zu feiern gibt?'\n\nDer Mann wischt sich den Mund ab, schaut den Wirt traurig an und lallt: 'Ich feiere... meinen ersten... oralen... Vorfall... im Leben.'\n\nDer Barkeeper strahlt über das ganze Gesicht, klopft ihm auf die Schulter und ruft begeistert: 'Mensch, das ist ja fantastisch! Herzlichen Glückwunsch! Weißt du was? Das achte Glas geht komplett auf Kosten des Hauses!'\n\nDer Mann schüttelt traurig den Kopf, schiebt das Glas beiseite und flüstert: 'Nee, lass mal stecken, Chef... Wenn der Geschmack nach den ersten sieben Gläsern reinem Whisky immer noch nicht aus dem Mund verschwunden ist, hilft das achte Glas jetzt ehrlich gesagt auch nicht mehr weiter!'" },
            { id: 93, cat: "Schule", text: "In der Schule fragt die Lehrerin im Deutschunterricht nach Beispielen für Wörter, die man sowohl vorwärts als auch rückwärts genau gleich liest – sogenannte *Palindrome*.\n\nLisa meldet sich: 'ANNA, Frau Lehrerin!'\nMax meldet sich: 'OTTO, Frau Lehrerin!'\n\nDer kleine Fritzchen im Hintergrund springt wild auf seinem Stuhl herum, meldet sich mit beiden Händen und ruft laut: 'Frau Lehrerin! Ich habe das absolut längste und genialste Palindrom der ganzen Welt!'\n\nDie Lehrerin schaut skeptisch: 'Na da bin ich aber mal gespannt, Fritzchen. Welches Wort soll das denn bitteschön sein?'\n\nFritzchen ruft stolz: 'GUTEN MORGEN, FRAU LEHRERIN!'\n\nDie Lehrerin schüttelt den Kopf: 'Aber Fritzchen, das ist doch völlig falsch! Wenn man das rückwärts liest, ergibt das doch überhaupt keinen Sinn!'\n\nFritzchen grinst breit: 'Na und?! Wenn Sie uns morgens um acht Uhr begrüßen, ergibt das für uns doch meistens auch absolut keinen Sinn!'" },
            { id: 94, cat: "Arzt", text: "Ein Mann kommt mit einem dicken Verband um das rechte Bein zum Arzt gehumpelt. Der Arzt fragt besorgt: 'Mensch, Herr Schmidt, was ist Ihnen denn passiert?'\n\nHerr Schmidt stöhnt: 'Ach Herr Doktor, das verdanke ich meinem neuen Hobby. Ich habe letzte Woche mit dem Reiten angefangen.'\n\nDer Arzt nickt verständnisvoll: 'Ah, ein klassischer Sturz vom Pferd. Das passiert Anfängern leider öfter.'\n\nHerr Schmidt schüttelt den Kopf: 'Nein, das ist es ja gerade... Ich bin überhaupt nicht vom Pferd gestürzt.'\n\nDer Arzt schaut verwirrt: 'Wie haben Sie sich denn dann diese schwere Verletzung am Bein zugezogen?'\n\nHerr Schmidt seufzt tief: 'Ganz einfach: Das Pferd stand an einer roten Ampel, ich wollte im Eifer des Gefechts vorschriftsmäßig den Blinker setzen... und habe dabei aus Versehen mit voller Wucht der Pferdefliege direkt ins Auge gestochen!'" },
            { id: 95, cat: "Verkehr", text: "Ein Lkw-Fahrer wird mitten in der Nacht von einer Polizeistreife auf der Landstraße angehalten. Der Polizist leuchtet mit der Taschenlampe ins Fahrerhaus und sagt streng: 'Guten Abend. Wir haben Sie nun schon seit drei Kilometern beobachtet. Sie halten an absolut jeder Kreuzung an, steigen aus, rennen wie wild um Ihren Lkw herum, schlagen mit einem dicken Holzknüppel gegen die Plane und steigen wieder ein! Können Sie mir mal verraten, was dieser absolute Blödsinn bitteschön bedeuten soll?!'\n\nDer Lkw-Fahrer wischt sich den Schweiß von der Stirn, schaut den Polizisten völlig fertig an und flüstert verzweifelt: 'Herr Wachtmeister, ich kann nicht anders! Ich fahre einen kleinen 3,5-Tonner. Ich habe aber hinten auf der Ladefläche genau sechs Tonnen lebendige Kanarienvögel geladen! Wenn ich nicht an jeder Ecke dafür sorge, dass mindestens die Hälfte von den kleinen Biestern permanent aufgeregt durch die Gegend fliegt, bricht mir auf der Stelle die ganze Achse durch!'" },
            { id: 96, cat: "Ehe", text: "Ein Ehemann kommt nach einem langen Arbeitstag nach Hause, geht ins Wohnzimmer und sieht seine Frau, die weinend auf dem Sofa sitzt und ein Taschentuch zerfetzt. 'Was ist denn los, mein Schatz?', fragt er besorgt.\n\nSie schluchzt: 'Ach, es ist schrecklich... Deine Mutter hat mich heute angerufen und mich am Telefon aufs Übelste beschimpft und beleidigt! Sie war unendlich gemein zu mir!'\n\nDer Ehemann stutzt, schaut ganz verwirrt auf die Uhr und sagt nachdenklich: 'Mhm... das ist aber wirklich seltsam. Meine Mutter ist doch schon seit drei Wochen im Urlaub auf Mallorca und hat dort laut ihrer Aussage überhaupt kein Handynetz...'\n\nDie Ehefrau schnieft, blickt kurz auf und sagt leise: 'Ja, das stimmt schon... Aber sie hat mir vorhin eine Postkarte geschrieben, und ich habe mir den Text beim Durchlesen einfach mit ihrer furchtbaren Stimme im Kopf vorgestellt!'" },
            { id: 97, cat: "Beruf", text: "Ein junger, ehrgeiziger Anwalt hat frisch seine eigene, edle Kanzlei in der Innenstadt eröffnet. Er sitzt stolz hinter seinem riesigen Schreibtisch aus Mahagoni, als er plötzlich Schritte im Flur hört. Ein potenzieller Kunde! Um unheimlich wichtig und beschäftigt zu wirken, greift er sofort zum Hörer seines Telefons, hält es ans Ohr und fängt lautstark an zu reden:\n\n'Ja, Herr Direktor! Gar kein Problem! Ich habe das Plädoyer für den Millionen-Prozess vor dem Bundesgerichtshof komplett fertig! Die Gegenseite hat absolut keine Chance gegen uns! Ich vertrete Sie da persönlich, machen Sie sich keine Sorgen! Gut, wir sprechen uns morgen. Auf Wiederhören!'\n\nEr legt den Hörer stolz auf die Gabel, blickt mit einem arroganten Lächeln auf den Mann, der in der Tür steht, und fragt geschäftsmäßig: 'So, mein Herr! Was kann ich für Sie tun?'\n\nDer Mann kratzt sich verlegen am Kopf und sagt leise: 'Ach, eigentlich gar nichts... Ich bin von der Telekom und wollte nur kurz Ihr Telefon anschließen, weil das Kabel noch hier draußen im Flur liegt!'" },
            { id: 98, cat: "Klassiker", text: "Zwei Männer fliegen in einem Heißluftballon über eine vollkommen unbekannte Landschaft. Plötzlich zieht dichter Nebel auf, sie verlieren komplett die Orientierung und treiben stundenlang hilflos umher. Schließlich reißt die Wolkendecke kurz auf und sie sehen weit unter sich einen Mann auf einer Wiese stehen.\n\nDer erste Ballonfahrer lehnt sich weit über den Korb und schreit aus vollem Hals nach unten: 'Hallo! Können Sie uns bitte helfen?! Wo befinden wir uns hier eigentlich?!'\n\nDer Mann auf der Wiese schaut nach oben, überlegt lange und gründlich, legt den Kopf schief und ruft schließlich laut zurück: 'Hallo! Sie befinden sich in einem Korb von einem Heißluftballon und schweben ungefähr zwanzig Meter über der Erde!'\n\nKurz darauf zieht der Nebel wieder zu und der Mann ist verschwunden.\n\nDer zweite Ballonfahrer schaut seinen Kollegen an und sagt seufzend: 'Das war ganz eindeutig ein IT-Unternehmensberater.'\n\nDer erste fragt erstaunt: 'Wahnsinn! Wie konntest du das denn aus der Entfernung so schnell herausfinden?'\n\n'Ganz einfach', sagt der zweite: 'Seine Antwort kam unheimlich spät, sie war mathematisch und sachlich zu einhundert Prozent korrekt – aber sie ist für uns im Moment schlicht und ergreifend absolut nutzlos!'" },
            { id: 99, cat: "Tiere", text: "Ein kleiner Hase hoppelt gemütlich durch den Wald, als er plötzlich ein großes Loch im Boden sieht. Er schaut neugierig hinein – und tatsächlich: Der dicke Fuchs ist in die Falle getappt und kommt von alleine nicht mehr heraus! Der Fuchs schaut den Hasen mit großen, traurigen Augen an und fleht: 'Lieber Hase, bitte hilf mir! Wenn du mich hier rausholst, schwöre ich dir bei allem, was mir wichtig ist, dass ich dich mein ganzes Leben lang nie wieder jagen werde!'\n\nDer Hase grinst breit, zuckt mit den Achseln und sagt cool: 'Nee, lass mal stecken, Kumpel. Das Risiko ist mir einfach viel zu groß.' Er dreht sich um und hoppelt fröhlich pfeifend weiter.\n\nZwei Stunden später bekommt der Hase jedoch ein schlechtes Gewissen, kehrt um und sieht, dass der Fuchs immer noch im Loch sitzt. 'Na gut', sagt der Hase, 'ich will mal nicht so sein.' Er bindet das Seil von seinem kleinen Mofa fest an einen Baum, wirft das andere Ende in das Loch, gibt ordentlich Gas und zieht den Fuchs glücklich nach oben.\n\nDer Fuchs ist unendlich dankbar, fällt dem Hasen um den Hals, hält sein Versprechen und geht friedlich seiner Wege.\n\nEin halbes Jahr später wendet sich das Blatt: Der Hase rennt unaufmerksam durch das Gebüsch und stürzt mitten in dasselbe Loch hinein! Er kommt nicht mehr heraus. Nach einer Stunde läuft zufällig der Fuchs am Loch vorbei, sieht den Hasen und ruft erschrocken: 'Mensch, kleiner Hase! Keine Sorge, ich helfe dir sofort!'\n\nDer Fuchs hat allerdings kein Mofa dabei. Er legt sich einfach flach auf den Bauch, lässt seinen langen, buschigen Schwanz tief in das Loch hinunterhängen und sagt: 'Hier, klammer dich fest!' Der Hase packt den Schwanz, der Fuchs zieht kräftig an und der Hase ist gerettet!\n\nUnd die Moral von der Geschicht'?! Ganz einfach: Wer einen schönen, langen, flauschigen Fuchsschwanz besitzt... braucht sich im Leben wirklich überhaupt kein Mofa zu kaufen!" },
            { id: 100, cat: "Erkenntnis", text: "Herzlichen Glückwunsch! Du hast das absolute Ende der 100 echten Witze erreicht. Du hast jetzt offiziell den ultimativen Humor-Ausweis bestanden. Wenn du auf das Zahnrad oben rechts klickst, wird der Speicher geleert und du kannst die Geschichten deinen Freunden noch mal von vorne erzählen!" }
        ];

        let currentRotation = 0;
        const btn = document.getElementById('spinBtn');
        const clearBtn = document.getElementById('clearBtn');
        const wheel = document.getElementById('luckyWheel');
        const categoryBadge = document.getElementById('categoryBadge');
        const jokeText = document.getElementById('jokeText');
        const counterDisplay = document.getElementById('counterDisplay');

        function getSeenJokes() {
            const seen = localStorage.getItem('cocos_seen_jokes');
            return seen ? JSON.parse(seen) : [];
        }

        function saveSeenJoke(id) {
            const seen = getSeenJokes();
            if (!seen.includes(id)) {
                seen.push(id);
                localStorage.setItem('cocos_seen_jokes', JSON.stringify(seen));
            }
            updateCounter();
        }

        function updateCounter() {
            const seenCount = getSeenJokes().length;
            counterDisplay.innerText = `${seenCount} / 100 Witze gesehen`;
        }

        function createGlitterRain() {
            const colors = ['#f49ac2', '#fbcce7', '#d4af37', '#ffffff', '#ffb6c1'];
            const shapes = ['50%', '0%'];
            
            for (let i = 0; i < 45; i++) {
                const glitter = document.createElement('div');
                glitter.classList.add('glitter');
                
                glitter.style.left = Math.random() * 100 + 'vw';
                glitter.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                glitter.style.borderRadius = shapes[Math.floor(Math.random() * shapes.length)];
                
                const size = Math.random() * 6 + 6;
                glitter.style.width = `${size}px`;
                glitter.style.height = `${size}px`;
                
                glitter.style.animationDuration = Math.random() * 2 + 1.5 + 's';
                glitter.style.animationDelay = Math.random() * 0.4 + 's';
                
                document.body.appendChild(glitter);
                
                glitter.addEventListener('animationend', () => {
                    glitter.remove();
                });
            }
        }

        btn.addEventListener('click', () => {
            const seenJokes = getSeenJokes();
            const availableJokes = jokesDatabase.filter(joke => !seenJokes.includes(joke.id));

            if (availableJokes.length === 0) {
                categoryBadge.innerText = "Wow!";
                jokeText.innerText = "Du hast alle 100 Witze gesehen! Der Verlauf wird jetzt automatisch zurückgesetzt, damit du von vorne starten kannst.";
                jokeText.style.textAlign = "center";
                localStorage.removeItem('cocos_seen_jokes');
                updateCounter();
                return;
            }

            btn.disabled = true;
            const randomJoke = availableJokes[Math.floor(Math.random() * availableJokes.length)];

            const addedRotation = 1080 + Math.floor(Math.random() * 360);
            currentRotation += addedRotation;
            wheel.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                categoryBadge.innerText = randomJoke.cat;
                jokeText.innerText = randomJoke.text;
                jokeText.style.textAlign = "left"; // Linksbündig für besseren Lesefluss bei Geschichten
                
                saveSeenJoke(randomJoke.id);
                createGlitterRain();
                btn.disabled = false;
            }, 3000);
        });

        clearBtn.addEventListener('click', () => {
            if (confirm("Möchtest du deinen Witz-Verlauf wirklich zurücksetzen?")) {
                localStorage.removeItem('cocos_seen_jokes');
                updateCounter();
                categoryBadge.innerText = "Reset";
                jokeText.innerText = "Verlauf gelöscht! Alle 100 Witze sind wieder im Lostopf.";
                jokeText.style.textAlign = "center";
            }
        });

        updateCounter();
    </script>
