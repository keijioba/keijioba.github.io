            :root {

            }

            body {

                background: var(--bg-gradient);
                color: var(--text-dark);
                margin: 0;
                padding: 0;
                display: flex;

                align-items: center;
                justify-content: center;
                min-height: 100vh;
                overflow: hidden;

                position: relative;
            }

            .container {

                flex-direction: column;
                align-items: center;

                right: 5px;
                background: transparent;
                border: none;
                font-size: 1.25rem;
                cursor: pointer;
                padding: 5px;
                opacity: 0.6;

                line-height: 1;
            }

            .clear-btn:active {

            }

                height: 180px;

                left: 50%;

                height: 100%;
                border-radius: 50%;

                box-shadow: 0 8px 20px rgba(179, 84, 125, 0.3), inset 0 0 15px rgba(0,0,0,0.05);

                transition: transform 3s cubic-bezier(0.1, 0.8, 0.1, 1);
            }

            .wheel-center {
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                width: 36px;
                height: 36px;
                background: var(--velvet-card);
                border-radius: 50%;
                border: 3px solid var(--gold-accent);
                box-shadow: 0 2px 5px rgba(0,0,0,0.1);

                border: 1px solid rgba(244, 154, 194, 0.3);

            .category-badge {
                position: absolute;
                top: 15px;
                font-size: 0.75rem;
                text-transform: uppercase;
                letter-spacing: 1.5px;
                color: var(--plush-dark);
                font-weight: bold;
                background-color: #fff0f5;

            .joke-text {
                font-size: 1.05rem;

                margin: 20px 0 0 0;
                word-wrap: break-word;
                max-height: 165px;
                overflow-y: auto;

            }

            .controls {
                width: 100%;
                margin-bottom: 25px;
            }

            .spin-btn {
                background: linear-gradient(135deg, var(--plush-pink) 0%, #f37cb4 100%);
                color: white;
                border: 2px solid var(--velvet-card);

            .spin-btn:active {
                transform: scale(0.97);
            }

            .spin-btn:disabled {
                background: #e0b6ca;
                box-shadow: none;

            }

            .glitter {
                position: absolute;
                width: 8px;
                height: 8px;
                opacity: 0;
                top: -10px;
                z-index: 1;
                pointer-events: none;
                border-radius: 50%;
                animation: fall linear forwards;
            }

            @keyframes fall {
                0% { transform: translateY(0) rotate(0deg); opacity: 1; }
                90% { opacity: 1; }
                100% { transform: translateY(105vh) rotate(720deg); opacity: 0; }
            }
        </style>
    </head>

                { id: 94, cat: "Büro", text: "Ich habe heute einen Zettel mit der Aufschrift 'Wichtig' weggeschmissen. Das Risiko erhöht den Puls ungemein." },
                { id: 95, cat: "Logik", text: "Wenn man im Wörterbuch nach dem Wort 'Motivation' sucht, findet man da im Moment höchstens ein Bild von meiner Couch." },
                { id: 96, cat: "Alltag", text: "Ich habe heute die Fenster geputzt. Jetzt sehe ich die Probleme da draußen viel schärfer." },
                { id: 97, cat: "Small Talk", text: "Ich habe heute ein Kompliment bekommen. Jemand meinte, ich sähe sehr entspannt aus. Ich war eigentlich nur zu müde, um mein Gesicht zu bewegen." },
                { id: 98, cat: "Finanzen", text: "Geld verdirbt den Charakter. Zum Glück bin ich finanziell absolut charakterfest geschützt." },
                { id: 99, cat: "Weisheit", text: "Der klügere gibt so lange nach, bis er der Dumme ist. Deswegen halte ich jetzt einfach direkt dagegen." },
                { id: 100, cat: "Erkenntnis", text: "Herzlichen Glückwunsch! Du hast das Ende der Witze erreicht. Du bist jetzt offiziell maximal tiefenentspannt." }
            ];

            let currentRotation = 0;
            const btn = document.getElementById('spinBtn');
            const clearBtn = document.getElementById('clearBtn');
            const wheel = document.getElementById('luckyWheel');
            const categoryBadge = document.getElementById('categoryBadge');
            const jokeText = document.getElementById('jokeText');
            const counterDisplay = document.getElementById('counterDisplay');

            function getSeenJokes() {
                const seen = localStorage.getItem('cocos_seen_jokes');
                return seen ? JSON.parse(seen) : [];
            }

            function saveSeenJoke(id) {
                const seen = getSeenJokes();
                if (!seen.includes(id)) {
                    seen.push(id);
                    localStorage.setItem('cocos_seen_jokes', JSON.stringify(seen));
                }
                updateCounter();
            }

            function updateCounter() {
                const seenCount = getSeenJokes().length;
                counterDisplay.innerText = `${seenCount} / 100 Witze gesehen`;
            }

            function createGlitterRain() {
                const colors = ['#f49ac2', '#fbcce7', '#d4af37', '#ffffff', '#ffb6c1'];
                const shapes = ['50%', '0%'];
                
                for (let i = 0; i < 45; i++) {
                    const glitter = document.createElement('div');
                    glitter.classList.add('glitter');
                    
                    glitter.style.left = Math.random() * 100 + 'vw';
                    glitter.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    glitter.style.borderRadius = shapes[Math.floor(Math.random() * shapes.length)];
                    
                    const size = Math.random() * 6 + 6;
                    glitter.style.width = `${size}px`;
                    glitter.style.height = `${size}px`;
                    
                    glitter.style.animationDuration = Math.random() * 2 + 1.5 + 's';
                    glitter.style.animationDelay = Math.random() * 0.4 + 's';
                    
                    document.body.appendChild(glitter);
                    
                    glitter.addEventListener('animationend', () => {
                        glitter.remove();
                    });
                }
            }

            btn.addEventListener('click', () => {
                const seenJokes = getSeenJokes();
                const availableJokes = jokesDatabase.filter(joke => !seenJokes.includes(joke.id));

                if (availableJokes.length === 0) {
                    categoryBadge.innerText = "Wow!";
                    jokeText.innerText = "Du hast alle 100 Witze gesehen! Der Verlauf wird jetzt automatisch zurückgesetzt, damit du von vorne starten kannst.";
                    localStorage.removeItem('cocos_seen_jokes');
                    updateCounter();
                    return;
                }

                btn.disabled = true;
                const randomJoke = availableJokes[Math.floor(Math.random() * availableJokes.length)];

                const addedRotation = 1080 + Math.floor(Math.random() * 360);
                currentRotation += addedRotation;
                wheel.style.transform = `rotate(${currentRotation}deg)`;

                setTimeout(() => {
                    categoryBadge.innerText = randomJoke.cat;
                    jokeText.innerText = randomJoke.text;
                    
                    saveSeenJoke(randomJoke.id);
                    createGlitterRain();
                    btn.disabled = false;
                }, 3000);
            });

            clearBtn.addEventListener('click', () => {
                if (confirm("Möchtest du deinen Witz-Verlauf wirklich zurücksetzen?")) {
                    localStorage.removeItem('cocos_seen_jokes');
                    updateCounter();
                    categoryBadge.innerText = "Reset";
                    jokeText.innerText = "Verlauf gelöscht! Alle 100 Witze sind wieder im Lostopf.";
                }
            });

            updateCounter();
        </script>
    </body>
    </html>
